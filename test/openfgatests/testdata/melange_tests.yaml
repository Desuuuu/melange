# Melange-specific tests that supplement the official OpenFGA test suite.
# These cover patterns discovered during development that are not (or not fully)
# covered by the upstream consolidated_1_1_tests.yaml.
#
# Test names are prefixed with "melange/" by the loader to avoid collisions
# with official test names.

tests:
  # ---------------------------------------------------------------------------
  # subtract_difference_exclusion
  # Pattern: writer but not (editor but not owner)
  # A "difference inside a difference" — the excluded set is itself an exclusion.
  # ---------------------------------------------------------------------------
  - name: subtract_difference_exclusion
    stages:
      - model: |
          model
            schema 1.1

          type user

          type document
            relations
              define writer: [user]
              define editor: [user]
              define owner: [user]
              define viewer: writer but not (editor but not owner)
        tuples:
          # aardvark: writer + editor + owner on doc:1
          - user: user:aardvark
            relation: writer
            object: document:1
          - user: user:aardvark
            relation: editor
            object: document:1
          - user: user:aardvark
            relation: owner
            object: document:1
          # badger: writer + editor (no owner) on doc:2
          - user: user:badger
            relation: writer
            object: document:2
          - user: user:badger
            relation: editor
            object: document:2
          # cheetah: writer + owner (no editor) on doc:3
          - user: user:cheetah
            relation: writer
            object: document:3
          - user: user:cheetah
            relation: owner
            object: document:3
        checkAssertions:
          - name: aardvark_allowed_editor_but_not_owner_is_false
            tuple:
              user: user:aardvark
              relation: viewer
              object: document:1
            expectation: true
          - name: badger_excluded_editor_but_not_owner_is_true
            tuple:
              user: user:badger
              relation: viewer
              object: document:2
            expectation: false
          - name: cheetah_allowed_not_editor
            tuple:
              user: user:cheetah
              relation: viewer
              object: document:3
            expectation: true

  # ---------------------------------------------------------------------------
  # basic_intersection
  # Pattern: writer and editor
  # Both relations must be satisfied.
  # ---------------------------------------------------------------------------
  - name: basic_intersection
    stages:
      - model: |
          model
            schema 1.1

          type user

          type document
            relations
              define writer: [user]
              define editor: [user]
              define viewer: writer and editor
        tuples:
          - user: user:aardvark
            relation: writer
            object: document:1
          - user: user:aardvark
            relation: editor
            object: document:1
          - user: user:badger
            relation: writer
            object: document:2
          - user: user:cheetah
            relation: editor
            object: document:3
        checkAssertions:
          - name: aardvark_has_both
            tuple:
              user: user:aardvark
              relation: viewer
              object: document:1
            expectation: true
          - name: badger_only_writer
            tuple:
              user: user:badger
              relation: viewer
              object: document:2
            expectation: false
          - name: cheetah_only_editor
            tuple:
              user: user:cheetah
              relation: viewer
              object: document:3
            expectation: false

  # ---------------------------------------------------------------------------
  # intersection_exclusion_in_subtract
  # Pattern: writer but not (editor and owner)
  # The excluded set is an intersection.
  # ---------------------------------------------------------------------------
  - name: intersection_exclusion_in_subtract
    stages:
      - model: |
          model
            schema 1.1

          type user

          type document
            relations
              define writer: [user]
              define editor: [user]
              define owner: [user]
              define viewer: writer but not (editor and owner)
        tuples:
          # aardvark: writer + editor + owner on doc:1
          - user: user:aardvark
            relation: writer
            object: document:1
          - user: user:aardvark
            relation: editor
            object: document:1
          - user: user:aardvark
            relation: owner
            object: document:1
          # badger: writer + editor (no owner) on doc:2
          - user: user:badger
            relation: writer
            object: document:2
          - user: user:badger
            relation: editor
            object: document:2
          # cheetah: writer + owner (no editor) on doc:3
          - user: user:cheetah
            relation: writer
            object: document:3
          - user: user:cheetah
            relation: owner
            object: document:3
          # duck: writer only on doc:4
          - user: user:duck
            relation: writer
            object: document:4
        checkAssertions:
          - name: aardvark_excluded_by_editor_and_owner
            tuple:
              user: user:aardvark
              relation: viewer
              object: document:1
            expectation: false
          - name: badger_allowed_only_editor_not_owner
            tuple:
              user: user:badger
              relation: viewer
              object: document:2
            expectation: true
          - name: cheetah_allowed_only_owner_not_editor
            tuple:
              user: user:cheetah
              relation: viewer
              object: document:3
            expectation: true
          - name: duck_allowed_writer_only
            tuple:
              user: user:duck
              relation: viewer
              object: document:4
            expectation: true

  # ---------------------------------------------------------------------------
  # intersection_wildcard_in_computed
  # Pattern: [user:*] and allowed, then can_view: viewer (computed)
  # Wildcard in an intersection, accessed through a computed relation.
  # ---------------------------------------------------------------------------
  - name: intersection_wildcard_in_computed
    stages:
      - model: |
          model
            schema 1.1

          type user

          type document
            relations
              define allowed: [user]
              define viewer: [user:*] and allowed
              define can_view: viewer
        tuples:
          - user: user:jon
            relation: allowed
            object: document:1
          - user: user:*
            relation: viewer
            object: document:1
          - user: user:*
            relation: viewer
            object: document:2
        checkAssertions:
          - name: jon_can_view_doc1_allowed_and_wildcard
            tuple:
              user: user:jon
              relation: can_view
              object: document:1
            expectation: true
          - name: bob_denied_doc2_not_allowed
            tuple:
              user: user:bob
              relation: can_view
              object: document:2
            expectation: false
          - name: jon_denied_doc2_not_allowed
            tuple:
              user: user:jon
              relation: can_view
              object: document:2
            expectation: false
        listUsersAssertions:
          - request:
              object: document:1
              relation: can_view
              filters:
                - user
            expectation:
              - user:jon

  # ---------------------------------------------------------------------------
  # this_and_intersection
  # Pattern: [user] and writer
  # Direct tuple assignment combined with intersection.
  # ---------------------------------------------------------------------------
  - name: this_and_intersection
    stages:
      - model: |
          model
            schema 1.1

          type user

          type document
            relations
              define writer: [user]
              define viewer: [user] and writer
        tuples:
          # aardvark: both viewer tuple and writer
          - user: user:aardvark
            relation: viewer
            object: document:1
          - user: user:aardvark
            relation: writer
            object: document:1
          # badger: only viewer tuple (no writer)
          - user: user:badger
            relation: viewer
            object: document:2
          # cheetah: only writer (no viewer tuple)
          - user: user:cheetah
            relation: writer
            object: document:3
        checkAssertions:
          - name: aardvark_has_both_viewer_and_writer
            tuple:
              user: user:aardvark
              relation: viewer
              object: document:1
            expectation: true
          - name: badger_only_viewer_missing_writer
            tuple:
              user: user:badger
              relation: viewer
              object: document:2
            expectation: false
          - name: cheetah_only_writer_missing_viewer
            tuple:
              user: user:cheetah
              relation: viewer
              object: document:3
            expectation: false

  # ---------------------------------------------------------------------------
  # intersection_with_ttu_union
  # Pattern: viewer and (member from group or owner from group)
  # Intersection where one operand is a union of TTU patterns.
  # ---------------------------------------------------------------------------
  - name: intersection_with_ttu_union
    stages:
      - model: |
          model
            schema 1.1

          type user

          type group
            relations
              define owner: [user]
              define member: [user]

          type folder
            relations
              define group: [group]
              define viewer: [user]
              define can_view: viewer and (member from group or owner from group)
        tuples:
          # Group membership
          - user: user:alice
            relation: member
            object: group:engineering
          - user: user:bob
            relation: owner
            object: group:engineering
          # Folder -> Group link
          - user: group:engineering
            relation: group
            object: folder:docs
          # Viewer relations on folder
          - user: user:alice
            relation: viewer
            object: folder:docs
          - user: user:bob
            relation: viewer
            object: folder:docs
          - user: user:charlie
            relation: viewer
            object: folder:docs
          # Diana is member of group but NOT viewer of folder
          - user: user:diana
            relation: member
            object: group:engineering
        checkAssertions:
          - name: alice_allowed_viewer_and_member
            tuple:
              user: user:alice
              relation: can_view
              object: folder:docs
            expectation: true
          - name: bob_allowed_viewer_and_owner
            tuple:
              user: user:bob
              relation: can_view
              object: folder:docs
            expectation: true
          - name: charlie_denied_viewer_but_not_in_group
            tuple:
              user: user:charlie
              relation: can_view
              object: folder:docs
            expectation: false
          - name: diana_denied_member_but_not_viewer
            tuple:
              user: user:diana
              relation: can_view
              object: folder:docs
            expectation: false
          - name: unknown_denied_no_relations
            tuple:
              user: user:unknown
              relation: can_view
              object: folder:docs
            expectation: false

  # ---------------------------------------------------------------------------
  # intersection_with_mixed_union
  # Pattern: editor and (admin or owner from org)
  # Intersection where one operand mixes a direct relation and a TTU.
  # ---------------------------------------------------------------------------
  - name: intersection_with_mixed_union
    stages:
      - model: |
          model
            schema 1.1

          type user

          type org
            relations
              define owner: [user]

          type document
            relations
              define org: [org]
              define editor: [user]
              define admin: [user]
              define can_edit: editor and (admin or owner from org)
        tuples:
          # Org ownership
          - user: user:ceo
            relation: owner
            object: org:acme
          # Document -> Org link
          - user: org:acme
            relation: org
            object: document:report
          # Editor relations
          - user: user:alice
            relation: editor
            object: document:report
          - user: user:bob
            relation: editor
            object: document:report
          - user: user:ceo
            relation: editor
            object: document:report
          - user: user:charlie
            relation: editor
            object: document:report
          # Admin relation (direct)
          - user: user:alice
            relation: admin
            object: document:report
        checkAssertions:
          - name: alice_allowed_via_admin
            tuple:
              user: user:alice
              relation: can_edit
              object: document:report
            expectation: true
          - name: ceo_allowed_via_org_owner
            tuple:
              user: user:ceo
              relation: can_edit
              object: document:report
            expectation: true
          - name: bob_denied_not_admin_not_org_owner
            tuple:
              user: user:bob
              relation: can_edit
              object: document:report
            expectation: false
          - name: charlie_denied_not_admin_not_org_owner
            tuple:
              user: user:charlie
              relation: can_edit
              object: document:report
            expectation: false

  # ---------------------------------------------------------------------------
  # closure_userset_all_relations
  # Pattern: can_view: editor, editor: [user, group#member] or manager,
  #          manager: [user, group#member]
  # Verifies that list_objects expands group#member usersets for ALL relations
  # in a computed permission's closure, not just the first one encountered.
  # Regression test for: group#member userset expansion was deduplicated by
  # subject pattern alone, causing list_objects to miss grant tuples on
  # implied relations (e.g. manager) when a closer relation (e.g. editor)
  # shared the same userset pattern.
  # ---------------------------------------------------------------------------
  - name: closure_userset_all_relations
    stages:
      - model: |
          model
            schema 1.1

          type user

          type group
            relations
              define member: [user, group#member]

          type document
            relations
              define manager: [user, group#member]
              define editor: [user, group#member] or manager
              define can_view: editor
        tuples:
          # alice is a member of the engineering group
          - user: user:alice
            relation: member
            object: group:engineering
          # engineering group has MANAGER on doc1
          - user: group:engineering#member
            relation: manager
            object: document:doc1
          # engineering group has EDITOR on doc2
          - user: group:engineering#member
            relation: editor
            object: document:doc2
        checkAssertions:
          - name: alice_can_view_doc1_via_manager
            tuple:
              user: user:alice
              relation: can_view
              object: document:doc1
            expectation: true
          - name: alice_can_view_doc2_via_editor
            tuple:
              user: user:alice
              relation: can_view
              object: document:doc2
            expectation: true
          - name: alice_cannot_view_doc3
            tuple:
              user: user:alice
              relation: can_view
              object: document:doc3
            expectation: false
        listObjectsAssertions:
          - request:
              user: user:alice
              type: document
              relation: can_view
            expectation:
              - document:doc1
              - document:doc2

  # ---------------------------------------------------------------------------
  # non_propagating_relation_in_recursive_list
  # Pattern: can_view: viewer or folder_viewer
  #          viewer: [user] or viewer from parent (propagates)
  #          folder_viewer: [user]                (does NOT propagate)
  # Verifies that list_objects does not propagate non-propagating relations
  # through parent TTU in the recursive CTE.
  # Regression test for: the recursive step in list_*_objects treats ALL base
  # results as propagatable parents, so folder_viewer on a parent incorrectly
  # gives can_view on children.
  # ---------------------------------------------------------------------------
  - name: non_propagating_relation_in_recursive_list
    stages:
      - model: |
          model
            schema 1.1

          type user

          type folder
            relations
              define parent: [folder]
              define viewer: [user] or viewer from parent
              define folder_viewer: [user]
              define can_view: viewer or folder_viewer
        tuples:
          # folder:child's parent is folder:root
          - user: folder:root
            relation: parent
            object: folder:child
          # alice has folder_viewer on root (non-propagating)
          - user: user:alice
            relation: folder_viewer
            object: folder:root
          # bob has viewer on root (propagating)
          - user: user:bob
            relation: viewer
            object: folder:root
        checkAssertions:
          - name: alice_can_view_root_via_folder_viewer
            tuple:
              user: user:alice
              relation: can_view
              object: folder:root
            expectation: true
          - name: alice_cannot_view_child_folder_viewer_does_not_propagate
            tuple:
              user: user:alice
              relation: can_view
              object: folder:child
            expectation: false
          - name: bob_can_view_root_via_viewer
            tuple:
              user: user:bob
              relation: can_view
              object: folder:root
            expectation: true
          - name: bob_can_view_child_viewer_propagates
            tuple:
              user: user:bob
              relation: can_view
              object: folder:child
            expectation: true
        listObjectsAssertions:
          - request:
              user: user:alice
              type: folder
              relation: can_view
            expectation:
              - folder:root
          - request:
              user: user:bob
              type: folder
              relation: can_view
            expectation:
              - folder:child
              - folder:root

  # ===========================================================================
  # Self-Referential Userset Tests
  # These exercise the selfref block generators in list_objects and list_subjects.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # selfref_group_membership
  # Pattern: group.member: [user, group#member]
  # A group's members include direct users AND members of nested groups.
  # This is the canonical self-referential userset pattern.
  # ---------------------------------------------------------------------------
  - name: selfref_group_membership
    stages:
      - model: |
          model
            schema 1.1

          type user

          type group
            relations
              define member: [user, group#member]
        tuples:
          # Direct members of groups
          - user: user:alice
            relation: member
            object: group:engineering
          - user: user:bob
            relation: member
            object: group:backend
          # backend is a sub-group of engineering
          - user: group:backend#member
            relation: member
            object: group:engineering
          # charlie is only in backend
          - user: user:charlie
            relation: member
            object: group:backend
        checkAssertions:
          - name: alice_direct_member_of_engineering
            tuple:
              user: user:alice
              relation: member
              object: group:engineering
            expectation: true
          - name: bob_direct_member_of_backend
            tuple:
              user: user:bob
              relation: member
              object: group:backend
            expectation: true
          - name: charlie_member_of_engineering_via_backend
            tuple:
              user: user:charlie
              relation: member
              object: group:engineering
            expectation: true
          - name: alice_not_member_of_backend
            tuple:
              user: user:alice
              relation: member
              object: group:backend
            expectation: false
          - name: bob_member_of_engineering_via_backend
            tuple:
              user: user:bob
              relation: member
              object: group:engineering
            expectation: true
        listObjectsAssertions:
          - request:
              user: user:charlie
              type: group
              relation: member
            expectation:
              - group:backend
              - group:engineering
          - request:
              user: user:alice
              type: group
              relation: member
            expectation:
              - group:engineering

  # ---------------------------------------------------------------------------
  # selfref_group_with_viewer_permission
  # Pattern: group.member: [user, group#member]
  #          document.viewer: [user, group#member]
  # Exercises the closure pattern path in selfref: a permission on another type
  # references the self-referential relation, requiring group expansion.
  # ---------------------------------------------------------------------------
  - name: selfref_group_with_viewer_permission
    stages:
      - model: |
          model
            schema 1.1

          type user

          type group
            relations
              define member: [user, group#member]

          type document
            relations
              define viewer: [user, group#member]
        tuples:
          - user: user:alice
            relation: member
            object: group:engineering
          - user: user:bob
            relation: member
            object: group:backend
          - user: group:backend#member
            relation: member
            object: group:engineering
          # engineering group can view doc1
          - user: group:engineering#member
            relation: viewer
            object: document:doc1
          # backend group can view doc2
          - user: group:backend#member
            relation: viewer
            object: document:doc2
          # direct user viewer
          - user: user:charlie
            relation: viewer
            object: document:doc3
        checkAssertions:
          - name: alice_can_view_doc1_via_engineering
            tuple:
              user: user:alice
              relation: viewer
              object: document:doc1
            expectation: true
          - name: bob_can_view_doc1_via_backend_then_engineering
            tuple:
              user: user:bob
              relation: viewer
              object: document:doc1
            expectation: true
          - name: bob_can_view_doc2_via_backend
            tuple:
              user: user:bob
              relation: viewer
              object: document:doc2
            expectation: true
          - name: alice_cannot_view_doc2
            tuple:
              user: user:alice
              relation: viewer
              object: document:doc2
            expectation: false
          - name: charlie_can_view_doc3
            tuple:
              user: user:charlie
              relation: viewer
              object: document:doc3
            expectation: true
        listObjectsAssertions:
          - request:
              user: user:bob
              type: document
              relation: viewer
            expectation:
              - document:doc1
              - document:doc2
          - request:
              user: user:alice
              type: document
              relation: viewer
            expectation:
              - document:doc1

  # ---------------------------------------------------------------------------
  # selfref_nested_three_levels
  # Pattern: group.member: [user, group#member] with 3-level nesting
  # Exercises recursive expansion beyond two levels.
  # ---------------------------------------------------------------------------
  - name: selfref_nested_three_levels
    stages:
      - model: |
          model
            schema 1.1

          type user

          type group
            relations
              define member: [user, group#member]
        tuples:
          - user: user:alice
            relation: member
            object: group:team-a
          - user: group:team-a#member
            relation: member
            object: group:division
          - user: group:division#member
            relation: member
            object: group:company
        checkAssertions:
          - name: alice_member_of_team
            tuple:
              user: user:alice
              relation: member
              object: group:team-a
            expectation: true
          - name: alice_member_of_division_via_team
            tuple:
              user: user:alice
              relation: member
              object: group:division
            expectation: true
          - name: alice_member_of_company_via_division_via_team
            tuple:
              user: user:alice
              relation: member
              object: group:company
            expectation: true
        listObjectsAssertions:
          - request:
              user: user:alice
              type: group
              relation: member
            expectation:
              - group:team-a
              - group:division
              - group:company

  # ---------------------------------------------------------------------------
  # selfref_with_implied_role
  # Pattern: group.member: [user, group#member]
  #          group.admin: [user] or member
  # Self-referential userset combined with a computed (implied) role.
  # Exercises complex closure paths through the selfref expansion.
  # ---------------------------------------------------------------------------
  - name: selfref_with_implied_role
    stages:
      - model: |
          model
            schema 1.1

          type user

          type group
            relations
              define member: [user, group#member]
              define admin: [user] or member
        tuples:
          - user: user:alice
            relation: member
            object: group:backend
          - user: group:backend#member
            relation: member
            object: group:engineering
          - user: user:bob
            relation: admin
            object: group:engineering
        checkAssertions:
          - name: alice_admin_of_engineering_via_member_via_backend
            tuple:
              user: user:alice
              relation: admin
              object: group:engineering
            expectation: true
          - name: bob_admin_of_engineering_direct
            tuple:
              user: user:bob
              relation: admin
              object: group:engineering
            expectation: true
          - name: bob_not_admin_of_backend
            tuple:
              user: user:bob
              relation: admin
              object: group:backend
            expectation: false
        listObjectsAssertions:
          - request:
              user: user:alice
              type: group
              relation: admin
            expectation:
              - group:backend
              - group:engineering
          - request:
              user: user:bob
              type: group
              relation: admin
            expectation:
              - group:engineering

  # ---------------------------------------------------------------------------
  # selfref_with_exclusion
  # Pattern: group.member: [user, group#member]
  #          group.blocked: [user]
  #          group.active_member: member but not blocked
  # Self-referential userset with exclusion on the derived permission.
  # Exercises the exclusion predicate path in selfref blocks.
  # ---------------------------------------------------------------------------
  - name: selfref_with_exclusion
    stages:
      - model: |
          model
            schema 1.1

          type user

          type group
            relations
              define member: [user, group#member]
              define blocked: [user]
              define active_member: member but not blocked
        tuples:
          - user: user:alice
            relation: member
            object: group:engineering
          - user: user:bob
            relation: member
            object: group:backend
          - user: group:backend#member
            relation: member
            object: group:engineering
          - user: user:bob
            relation: blocked
            object: group:engineering
        checkAssertions:
          - name: alice_active_member_of_engineering
            tuple:
              user: user:alice
              relation: active_member
              object: group:engineering
            expectation: true
          - name: bob_not_active_member_blocked
            tuple:
              user: user:bob
              relation: active_member
              object: group:engineering
            expectation: false
          - name: bob_active_member_of_backend_not_blocked_there
            tuple:
              user: user:bob
              relation: active_member
              object: group:backend
            expectation: true
        listObjectsAssertions:
          - request:
              user: user:alice
              type: group
              relation: active_member
            expectation:
              - group:engineering
          - request:
              user: user:bob
              type: group
              relation: active_member
            expectation:
              - group:backend

  # ===========================================================================
  # Composed Relation Tests
  # These exercise the composed block generators for indirect anchor patterns
  # (TTU and userset composition).
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # composed_ttu_with_recursive_parent
  # Pattern: folder.parent: [folder]
  #          folder.viewer: [user]
  #          document.parent: [folder]
  #          document.viewer: viewer from parent
  # TTU composition where the parent type can recursively reference itself.
  # Exercises the recursive TTU block path in composed generators.
  # ---------------------------------------------------------------------------
  - name: composed_ttu_with_recursive_parent
    stages:
      - model: |
          model
            schema 1.1

          type user

          type folder
            relations
              define parent: [folder]
              define viewer: [user] or viewer from parent
        tuples:
          - user: user:alice
            relation: viewer
            object: folder:root
          - user: folder:root
            relation: parent
            object: folder:projects
          - user: folder:projects
            relation: parent
            object: folder:docs
          - user: user:bob
            relation: viewer
            object: folder:projects
        checkAssertions:
          - name: alice_can_view_root
            tuple:
              user: user:alice
              relation: viewer
              object: folder:root
            expectation: true
          - name: alice_can_view_projects_via_root
            tuple:
              user: user:alice
              relation: viewer
              object: folder:projects
            expectation: true
          - name: alice_can_view_docs_via_root_via_projects
            tuple:
              user: user:alice
              relation: viewer
              object: folder:docs
            expectation: true
          - name: bob_can_view_projects
            tuple:
              user: user:bob
              relation: viewer
              object: folder:projects
            expectation: true
          - name: bob_can_view_docs_via_projects
            tuple:
              user: user:bob
              relation: viewer
              object: folder:docs
            expectation: true
          - name: bob_cannot_view_root
            tuple:
              user: user:bob
              relation: viewer
              object: folder:root
            expectation: false
        listObjectsAssertions:
          - request:
              user: user:alice
              type: folder
              relation: viewer
            expectation:
              - folder:root
              - folder:projects
              - folder:docs
          - request:
              user: user:bob
              type: folder
              relation: viewer
            expectation:
              - folder:projects
              - folder:docs

  # ---------------------------------------------------------------------------
  # composed_userset_indirect
  # Pattern: team.member: [user]
  #          project.team: [team#member]
  #          project.viewer: team
  # Userset composition: viewer is computed from team, which references
  # team#member. Exercises the userset composition block path.
  # ---------------------------------------------------------------------------
  - name: composed_userset_indirect
    stages:
      - model: |
          model
            schema 1.1

          type user

          type team
            relations
              define member: [user]

          type project
            relations
              define team: [team#member]
              define viewer: team
        tuples:
          - user: user:alice
            relation: member
            object: team:backend
          - user: user:bob
            relation: member
            object: team:frontend
          - user: team:backend#member
            relation: team
            object: project:api
          - user: team:frontend#member
            relation: team
            object: project:webapp
        checkAssertions:
          - name: alice_viewer_of_api_via_backend_team
            tuple:
              user: user:alice
              relation: viewer
              object: project:api
            expectation: true
          - name: bob_viewer_of_webapp_via_frontend_team
            tuple:
              user: user:bob
              relation: viewer
              object: project:webapp
            expectation: true
          - name: alice_not_viewer_of_webapp
            tuple:
              user: user:alice
              relation: viewer
              object: project:webapp
            expectation: false
          - name: bob_not_viewer_of_api
            tuple:
              user: user:bob
              relation: viewer
              object: project:api
            expectation: false
        listObjectsAssertions:
          - request:
              user: user:alice
              type: project
              relation: viewer
            expectation:
              - project:api
          - request:
              user: user:bob
              type: project
              relation: viewer
            expectation:
              - project:webapp

  # ---------------------------------------------------------------------------
  # composed_ttu_with_exclusion
  # Pattern: folder.viewer: [user]
  #          folder.blocked: [user]
  #          document.parent: [folder]
  #          document.viewer: viewer from parent but not blocked_viewer
  #          document.blocked_viewer: blocked from parent
  # TTU composition with exclusion — viewer inherits from parent but can be
  # blocked. Exercises exclusion predicates in composed blocks.
  # ---------------------------------------------------------------------------
  - name: composed_ttu_with_exclusion
    stages:
      - model: |
          model
            schema 1.1

          type user

          type folder
            relations
              define viewer: [user]
              define blocked: [user]

          type document
            relations
              define parent: [folder]
              define blocked_viewer: blocked from parent
              define viewer: viewer from parent but not blocked_viewer
        tuples:
          - user: user:alice
            relation: viewer
            object: folder:shared
          - user: user:bob
            relation: viewer
            object: folder:shared
          - user: user:bob
            relation: blocked
            object: folder:shared
          - user: folder:shared
            relation: parent
            object: document:report
        checkAssertions:
          - name: alice_can_view_document_via_folder
            tuple:
              user: user:alice
              relation: viewer
              object: document:report
            expectation: true
          - name: bob_blocked_from_document
            tuple:
              user: user:bob
              relation: viewer
              object: document:report
            expectation: false
        listObjectsAssertions:
          - request:
              user: user:alice
              type: document
              relation: viewer
            expectation:
              - document:report
          - request:
              user: user:bob
              type: document
              relation: viewer
            expectation: []

  # ---------------------------------------------------------------------------
  # composed_ttu_cross_type
  # Pattern: org.member: [user]
  #          project.org: [org]
  #          project.viewer: member from org
  # TTU across different types — project inherits viewers from org members.
  # Exercises the cross-type TTU path in composed generators.
  # ---------------------------------------------------------------------------
  - name: composed_ttu_cross_type
    stages:
      - model: |
          model
            schema 1.1

          type user

          type org
            relations
              define member: [user]

          type project
            relations
              define org: [org]
              define viewer: member from org
        tuples:
          - user: user:alice
            relation: member
            object: org:acme
          - user: user:bob
            relation: member
            object: org:globex
          - user: org:acme
            relation: org
            object: project:alpha
          - user: org:globex
            relation: org
            object: project:beta
        checkAssertions:
          - name: alice_viewer_of_alpha_via_acme
            tuple:
              user: user:alice
              relation: viewer
              object: project:alpha
            expectation: true
          - name: bob_viewer_of_beta_via_globex
            tuple:
              user: user:bob
              relation: viewer
              object: project:beta
            expectation: true
          - name: alice_not_viewer_of_beta
            tuple:
              user: user:alice
              relation: viewer
              object: project:beta
            expectation: false
        listObjectsAssertions:
          - request:
              user: user:alice
              type: project
              relation: viewer
            expectation:
              - project:alpha
          - request:
              user: user:bob
              type: project
              relation: viewer
            expectation:
              - project:beta
